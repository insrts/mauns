name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build-binaries:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: mauns-linux-x64.tar.gz
            binary: mauns

          # Linux ARM64 (cross)
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: mauns-linux-arm64.tar.gz
            binary: mauns
            cross: true

          # macOS Intel
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: mauns-macos-x64.tar.gz
            binary: mauns

          # macOS ARM
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: mauns-macos-arm64.tar.gz
            binary: mauns

          # Windows
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: mauns-windows-x64.zip
            binary: mauns.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ FIX: force bash so regex works everywhere
      - name: Validate version tag
        shell: bash
        run: |
          if ! [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version tag"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --version 0.2.5

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config musl-tools

      - name: macOS deps
        if: runner.os == 'macOS'
        run: brew install openssl

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --bin mauns --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --bin mauns --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }} || true

      # ---------------- Packaging ----------------

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} mauns
          tar -czf "${{ matrix.archive }}" mauns README.md LICENSE

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target\${{ matrix.target }}\release\${{ matrix.binary }} mauns.exe
          Compress-Archive -Path mauns.exe, README.md, LICENSE -DestinationPath "${{ matrix.archive }}"

          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File "${{ matrix.archive }}.sha256"

      - name: Verify checksum
        if: runner.os != 'Windows'
        run: sha256sum -c *.sha256 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  github-release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}

          awk "/^## \[${VERSION#v}\]/{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md > notes.md || true

          if [ ! -s notes.md ]; then
            echo "Release $VERSION" > notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mauns ${{ github.ref_name }}
          body_path: notes.md
          files: artifacts/**

  npm-publish:
    name: npm publish
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Prepare binaries
        shell: bash
        run: |
          mkdir -p bin
          shopt -s nullglob

          for f in artifacts/*.tar.gz; do
            tar -xzf "$f" mauns
            mv mauns bin/$(basename "$f" .tar.gz)
          done

      - name: npm dry run
        run: npm pack --dry-run

      - name: Set version
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version --allow-same-version

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Docker
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  helm:
    name: Helm
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm package helm/mauns --destination charts/

      - name: Publish Helm repo
        shell: bash
        run: |
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout -b gh-pages

          cp charts/*.tgz .

          helm repo index . --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

          git config user.name github-actions
          git config user.email actions@github.com

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "release ${{ github.ref_name }}"
            git push origin gh-pages
          fi
